<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bangksgo — โซเชียลมีเดีย</title>
<style>
/* ===== (CSS ทั้งหมดที่ส่งมา) ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#ffffff;--bg2:#f5f5f7;--bg3:#eeeef0;--card:#ffffff;--text:#1a1a1a;--brand:#e85d4a;--brand-grad:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);--radius:16px;--nav-h:60px;--max-w:430px;}
[data-theme="dark"]{--bg:#0e0e10;--bg2:#161618;--card:#1a1a1e;--text:#f0f0f2;}
body{font-family:sans-serif;background:var(--bg);color:var(--text)}
#app{max-width:var(--max-w);margin:0 auto;min-height:100vh;background:var(--bg)}
.chat-room{display:flex;flex-direction:column;height:100vh;padding-bottom:60px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.message{padding:10px;border-radius:12px;max-width:80%;background:var(--bg2)}
.message.sent{align-self:flex-end;background:var(--brand);color:#fff}
.input-area{padding:16px;border-top:1px solid #333;display:flex;gap:10px}
input{flex:1;padding:10px;border-radius:20px;border:1px solid #444}
button{padding:10px 20px;background:var(--brand);color:#fff;border-radius:20px}
</style>
</head>
<body>

<div id="app">
    <div class="chat-room">
        <div class="chat-messages" id="chatBox">
            <div class="message">สวัสดี! มีอะไรให้ Bangksgo ช่วยไหม?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="พิมพ์ข้อความ...">
            <button onclick="sendMessage()">ส่ง</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const msg = input.value;
        if (!msg) return;

        chatBox.innerHTML += \`<div class="message sent">\${msg}</div>\`;
        input.value = "";

        try {
            const res = await fetch("https://my-chat-bot-9.onrender.com/api/chat", {
                method: "POST",
                headers: {"Content-Type":"application/json", "Authorization":"Bearer my-secret-key-123"},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            chatBox.innerHTML += \`<div class="message">\${data.reply}</div>\`;
        } catch(e) {
            chatBox.innerHTML += \`<div class="message" style="color:red">เชื่อมต่อบอทไม่ได้</div>\`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
